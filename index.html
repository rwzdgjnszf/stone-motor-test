<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>ESP32 Motor Control</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>

body{

font-family:Arial;

text-align:center;

background:#f5f5f5;

}

h1{

margin-top:30px;

}

button{

width:180px;

height:70px;

font-size:24px;

margin:15px;

border:none;

border-radius:15px;

color:white;

}

.key3{background:#e74c3c;}

.key4{background:#27ae60;}

.key5{background:#3498db;}

.key7{background:#f39c12;}

#status{

margin:20px;

font-size:20px;

}

</style>

</head>

<body>

<h1>ESP32 Motor Control</h1>

<div id="status">连接中...</div>

<button class="key3" onclick="sendCmd('KEY3')">

停止

</button>

<br>

<button class="key4" onclick="sendCmd('KEY4')">

自动运行

</button>

<br>

<button class="key5" onclick="sendCmd('KEY5')">

正转

</button>

<br>

<button class="key7" onclick="sendCmd('KEY7')">

反转

</button>

<script>

const client=mqtt.connect(

'wss://t170ac82.ala.cn-hangzhou.emqxsl.cn:8084/mqtt',

{

username:'stone',

password:'Stone123',

clean:true,

reconnectPeriod:3000

}

);

client.on(

'connect',

()=>{

document.getElementById('status').innerHTML=

'🟢 MQTT已连接';

}

);

client.on(

'reconnect',

()=>{

document.getElementById('status').innerHTML=

'🟡 重连中';

}

);

client.on(

'error',

()=>{

document.getElementById('status').innerHTML=

'🔴 连接失败';

}

);

function sendCmd(cmd)

{

client.publish(

'stone/motor/cmd',

cmd

);

}

</script>

</body>

</html>
