<!DOCTYPE html>

<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>STONE MOTOR</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>

body{

font-family:Arial,sans-serif;

background:#f5f5f5;

text-align:center;

margin:0;

padding:0;

}

h1{

margin-top:50px;

font-size:55px;

}

#status{

font-size:32px;

margin:30px;

font-weight:bold;

}

.container{

display:grid;

grid-template-columns:repeat(2,220px);

gap:30px;

justify-content:center;

margin-top:30px;

}

button{

width:220px;

height:120px;

font-size:38px;

border:none;

border-radius:15px;

cursor:pointer;

box-shadow:0 4px 10px rgba(0,0,0,0.2);

transition:0.15s;

}

button:active{

transform:scale(0.95);

}

.stop{

background:#ff4d4d;

color:white;

}

.run{

background:#00b050;

color:white;

}

.forward{

background:#0078ff;

color:white;

}

.backward{

background:#ff9900;

color:white;

}

.footer{

margin-top:60px;

font-size:18px;

color:#666;

}

</style>

</head>

<body>

<h1>STONE MOTOR</h1>

<div id="status">

🔴 正在连接...

</div>

<div class="container">

<button class="stop"

onclick="sendCmd('KEY3')">

⏸ 暂停

</button>

<button class="run"

onclick="sendCmd('KEY4')">

▶ 运行

</button>

<button class="forward"

onclick="sendCmd('KEY5')">

⬆ 前进

</button>

<button class="backward"

onclick="sendCmd('KEY7')">

⬇ 后退

</button>

</div>

<div class="footer">

ESP32 + HiveMQ Cloud

</div>

<script>

//================ MQTT连接 =================//

const client = mqtt.connect(

'wss://ed4df66491114cee9225255edfaa2e64.s1.eu.hivemq.cloud:8884/mqtt',

{

username:'stone',

password:'Stone123',

reconnectPeriod:3000

}

);

//================ 连接成功 =================//

client.on(

'connect',

()=>{

document.getElementById(

'status'

).innerHTML='🟢 已连接';

console.log(

'MQTT Connected'

);

}

);

//================ 连接失败 =================//

client.on(

'error',

(err)=>{

document.getElementById(

'status'

).innerHTML='🔴 连接失败';

console.log(err);

}

);

//================ 断开连接 =================//

client.on(

'offline',

()=>{

document.getElementById(

'status'

).innerHTML='🟠 重连中...';

}

);

//================ 发送命令 =================//

function sendCmd(cmd)

{

if(

client.connected

)

{

client.publish(

'stone/motor/cmd',

cmd

);

console.log(

'发送:',

cmd

);

}

else

{

alert(

'MQTT未连接'

);

}

}

</script>

</body>

</html>
