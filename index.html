<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>炉排液压缸控制系统</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f2f4f8;
}

.card{
    width:360px;
    margin:60px auto;
    background:white;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,0.15);
    padding:30px;
    text-align:center;
}

h1{
    margin-bottom:30px;
    font-size:30px;
}

input{

    width:260px;
    height:45px;

    font-size:18px;

    margin:10px;

    border-radius:8px;

    border:1px solid #ccc;

    padding-left:10px;

    outline:none;

}

.loginBtn{

    width:270px;

    height:50px;

    font-size:22px;

    border:none;

    border-radius:10px;

    background:#3498db;

    color:white;

    cursor:pointer;

}

.loginBtn:hover{

    background:#2980b9;

}

#loginMsg{

    color:red;

    margin-top:15px;

    font-size:18px;

}

#mainPage{

    display:none;

    text-align:center;

}

#status{

    margin:20px;

    font-size:22px;

}

button{

    width:180px;

    height:70px;

    font-size:24px;

    margin:15px;

    border:none;

    border-radius:15px;

    color:white;

    cursor:pointer;

}

button:hover{

    opacity:0.9;

}

.key3{

    background:#e74c3c;

}

.key4{

    background:#27ae60;

}

.key5{

    background:#3498db;

}

.key7{

    background:#f39c12;

}

</style>

</head>

<body>

<!-- 登录界面 -->

<div id="loginPage">

<div class="card">

<h1>炉排液压缸控制系统</h1>

<input
id="username"
placeholder="用户名">

<br>

<input
id="password"
type="password"
placeholder="密码">

<br><br>

<button
class="loginBtn"
onclick="login()">

登录

</button>

<div id="loginMsg"></div>

</div>

</div>

<!-- 控制界面 -->

<div
id="mainPage">

<h1>炉排液压缸控制系统</h1>

<div id="status">

连接中...

</div>

<button
class="key3"
onclick="sendCmd('KEY3')">

停止

</button>

<br>

<button
class="key4"
onclick="sendCmd('KEY4')">

自动运行

</button>

<br>

<button
class="key5"
onclick="sendCmd('KEY5')">

正转

</button>

<br>

<button
class="key7"
onclick="sendCmd('KEY7')">

反转

</button>

</div>

<script>

const USERNAME="123";
const PASSWORD="123";

function login(){

    let user=document.getElementById("username").value;

    let pass=document.getElementById("password").value;

    if(user===USERNAME && pass===PASSWORD){

        document.getElementById("loginPage").style.display="none";

        document.getElementById("mainPage").style.display="block";

    }else{

        document.getElementById("loginMsg").innerHTML="用户名或密码错误！";

    }

}

const client=mqtt.connect(

'wss://t170ac82.ala.cn-hangzhou.emqxsl.cn:8084/mqtt',

{

username:'stone',

password:'Stone123',

clean:true,

reconnectPeriod:3000

}

);

client.on(

'connect',

()=>{

document.getElementById('status').innerHTML='🟢 MQTT已连接';

}

);

client.on(

'reconnect',

()=>{

document.getElementById('status').innerHTML='🟡 重连中';

}

);

client.on(

'error',

()=>{

document.getElementById('status').innerHTML='🔴 连接失败';

}

);

function sendCmd(cmd){

client.publish(

'stone/motor/cmd',

cmd

);

}

</script>

</body>

</html>
