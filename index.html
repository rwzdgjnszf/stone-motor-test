<!DOCTYPE html>

<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>STONE MOTOR</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>

body{
font-family:Arial;
text-align:center;
background:#f5f5f5;
margin-top:60px;
}

h1{
font-size:60px;
margin-bottom:20px;
}

#status{
font-size:32px;
margin-bottom:30px;
}

.container{
display:grid;
grid-template-columns:220px 220px;
gap:30px;
justify-content:center;
}

button{

width:220px;

height:120px;

font-size:42px;

border:none;

border-radius:15px;

color:white;

cursor:pointer;

box-shadow:0 4px 10px rgba(0,0,0,0.2);

}

.stop{
background:#ff4d4d;
}

.run{
background:#00b140;
}

.forward{
background:#1677ff;
}

.backward{
background:#ff9900;
}

button:active{
transform:scale(0.95);
}

.footer{
margin-top:50px;
font-size:24px;
color:#666;
}

</style>

</head>

<body>

<h1>STONE MOTOR</h1>

<div id="status">

🟠 连接中...

</div>

<div class="container">

<button
class="stop"
onclick="sendCmd('KEY3')">

⏸ 暂停

</button>

<button
class="run"
onclick="sendCmd('KEY4')">

▶ 运行

</button>

<button
class="forward"
onclick="sendCmd('KEY5')">

⬆ 前进

</button>

<button
class="backward"
onclick="sendCmd('KEY7')">

⬇ 后退

</button>

</div>

<div class="footer">

ESP32 + HiveMQ Cloud

</div>

<script>

//================ HiveMQ Cloud ================

const broker =
'wss://ed4df66491114cee9225255edfaa2e64.s1.eu.hivemq.cloud:8884/mqtt';

const options = {

username:'stone',

password:'Stone123',

clientId:'web_'+Math.random().toString(16).substr(2,8),

clean:true,

connectTimeout:10000,

reconnectPeriod:3000

};

//================ 建立连接 ================

const client = mqtt.connect(

broker,

options

);

//================ 连接成功 ================

client.on(

'connect',

()=>{

document.getElementById(

'status'

).innerHTML='🟢 已连接';

console.log('MQTT Connected');

}

);

//================ 断开连接 ================

client.on(

'reconnect',

()=>{

document.getElementById(

'status'

).innerHTML='🟠 重连中...';

console.log('Reconnect');

}

);

//================ 错误信息 ================

client.on(

'error',

(err)=>{

document.getElementById(

'status'

).innerHTML='🔴 连接失败';

console.log(err);

}

);

//================ 发送命令 ================

function sendCmd(cmd)

{

if(

client.connected

)

{

client.publish(

'stone/motor/cmd',

cmd

);

console.log(

'发送:',

cmd

);

}

else

{

alert(

'尚未连接MQTT'

);

}

}

</script>

</body>

</html>
